<!-- ================= PAYMENT PAGE ================= -->

<!-- Save below as payment.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:30px;
}

.card {
  background: rgba(30,41,59,0.8);
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.btn {
  background: linear-gradient(135deg,#22c55e,#4ade80);
  color:#000;
  padding:15px 25px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

img {
  width:200px;
  margin:15px 0;
  border-radius:10px;
}

</style>
</head>

<body>
<div class="container">

<h1>💳 Complete Payment</h1>

<div class="card">
<p>Scan QR or Pay via UPI</p>

<!-- Replace with your QR image -->
<img src="your-qr.png" alt="UPI QR">

<p><b>UPI ID:</b> yourupi@upi</p>
<p>Amount: ₹199</p>

<a href="https://wa.me/91XXXXXXXXXX?text=I%20have%20paid%20for%20Trading%20Toolkit">
<button class="btn">I Have Paid ✅</button>
</a>

</div>

</div>
</body>
</html>
